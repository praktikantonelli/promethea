# .github/workflows/lints.yaml
name: Lints

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --manifest-path backend/Cargo.toml --all-targets --all-features -- -D warnings
